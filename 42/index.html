<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Error 42</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- system: anomaly ref e4tWzAfY -->
  <!-- nothing to see here -->

  <style>
    :root {
      color-scheme: dark;
    }

    body {
      background: #050608;
      color: #d6d6d6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .wrapper {
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 480px;
    }

    .code {
      font-size: 3.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #ff4b4b;
      margin-bottom: 0.75rem;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #444, transparent);
      margin: 0.75rem auto 1.5rem;
    }

    .line {
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9a9a9a;
      margin-bottom: 0.75rem;
    }

    .question {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #e0e0e0;
    }

    .hint {
      margin-top: 1.75rem;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <main class="wrapper" aria-labelledby="error-title">
    <div class="code" id="error-title">Error 42</div>
    <div class="divider"></div>
    <p class="line">You have the answer</p>
    <p class="line">but what was the question?</p>
    <p class="question">Some doors don’t open when you knock.<br>They open when you understand.</p>
    <p class="hint">this is not the end of the trail</p>
  </main>

</body>
</html>
